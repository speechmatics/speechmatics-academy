<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Alphanumerics Voice Agent</title>
  <style>
    body { font-family: sans-serif; max-width: 520px; margin: 60px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; margin-bottom: 24px; }
    #status { margin-bottom: 16px; color: #666; font-size: 0.9rem; }
    #status.connected { color: #2a9d2a; }
    #status.error { color: #c0392b; }
    .controls { display: flex; gap: 10px; margin-bottom: 32px; }
    button { padding: 8px 18px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: #fff; }
    button:disabled { opacity: 0.4; cursor: default; }
    #connect-btn { background: #2a9d2a; color: #fff; border-color: #2a9d2a; }
    #disconnect-btn { background: #c0392b; color: #fff; border-color: #c0392b; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }
    .field { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
    input {
      width: 100%; box-sizing: border-box; padding: 10px 12px;
      font-size: 1rem; border: 1px solid #ccc; border-radius: 4px;
      background: #fafafa; transition: border-color 0.2s, background 0.2s;
    }
    input.filled { border-color: #2a9d2a; background: #f0fff0; }
    #fill-log { margin-top: 6px; font-size: 0.8rem; color: #2a9d2a; min-height: 18px; }
  </style>
</head>
<body>
  <h1>Alphanumerics Voice Agent</h1>
  <div id="status">Disconnected</div>
  <div class="controls">
    <button id="connect-btn">Connect</button>
    <button id="disconnect-btn" disabled>Disconnect</button>
  </div>

  <div class="row">
    <div class="field">
      <label for="first_name">First Name</label>
      <input type="text" id="first_name" placeholder="…" readonly />
    </div>
    <div class="field">
      <label for="last_name">Last Name</label>
      <input type="text" id="last_name" placeholder="…" readonly />
    </div>
  </div>
  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="…" readonly />
  </div>
  <div class="field">
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" placeholder="…" readonly />
  </div>
  <div class="field">
    <label for="licence_plate">Licence Plate</label>
    <input type="text" id="licence_plate" placeholder="…" readonly />
  </div>
  <div class="field">
    <label for="account_number">Account Number</label>
    <input type="text" id="account_number" placeholder="…" readonly />
  </div>
  <div class="row">
    <div class="field">
      <label for="post_code">Post Code</label>
      <input type="text" id="post_code" placeholder="…" readonly />
    </div>
    <div class="field">
      <label for="city">City</label>
      <input type="text" id="city" placeholder="…" readonly />
    </div>
  </div>
  <div id="fill-log"></div>

  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <script>
    const { Room, RoomEvent, Track } = LivekitClient;

    const statusEl = document.getElementById('status');
    const connectBtn = document.getElementById('connect-btn');
    const disconnectBtn = document.getElementById('disconnect-btn');
    const fillLog = document.getElementById('fill-log');

    let room = null;

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls || '';
    }

    async function connect() {
      setStatus('Connecting…');
      try {
        const res = await fetch('/token');
        const { token, url, room: roomName } = await res.json();

        room = new Room();

        room.on(RoomEvent.TrackSubscribed, (track) => {
          if (track.kind === Track.Kind.Audio) {
            track.attach();
          }
        });

        room.on(RoomEvent.Disconnected, () => {
          setStatus('Disconnected');
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
        });

        await room.connect(url, token);

        room.localParticipant.registerRpcMethod('fillFormField', async (data) => {
          const payload = JSON.parse(data.payload);
          const input = document.getElementById(payload.field);
          if (input) {
            input.value = payload.value;
            input.classList.add('filled');
            fillLog.textContent = `Agent filled ${payload.field.replace('_', ' ')}: ${payload.value}`;
          }
          return JSON.stringify({ success: true });
        });

        await room.localParticipant.setMicrophoneEnabled(true);

        setStatus(`Connected — room: ${roomName}`, 'connected');
        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    async function disconnect() {
      if (room) {
        await room.disconnect();
        room = null;
      }
    }

    connectBtn.addEventListener('click', connect);
    disconnectBtn.addEventListener('click', disconnect);
  </script>
</body>
</html>
