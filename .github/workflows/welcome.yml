name: welcome

on:
  pull_request_target:
    types:
      - opened
  issues:
    types:
      - opened

permissions:
  issues: write
  pull-requests: write

jobs:
  thank_first_time_contributors:
    runs-on: ubuntu-latest
    if: >-
      (github.event.pull_request.user.type || github.event.issue.user.type) != 'Bot'
    steps:
      - name: Welcome first-time contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            Welcome to Speechmatics Academy @${{ github.event.pull_request.user.login }}! Thanks for your first contribution.

            If you find this project useful:
            - Star the repo: https://github.com/speechmatics/speechmatics-academy
            - Check out the docs: https://docs.speechmatics.com

            We're excited to have you here!
          issue-message: |
            Thanks for opening your first issue @${{ github.event.issue.user.login }}!

            We appreciate you taking the time to report this. Our team will take a look as soon as possible.

            In the meantime, feel free to:
            - Star the repo: https://github.com/speechmatics/speechmatics-academy
            - Check out the docs: https://docs.speechmatics.com

            We're glad to have you here!
