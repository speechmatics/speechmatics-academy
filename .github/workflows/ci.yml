name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    name: Python Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Python syntax check
        run: |
          find . -name "*.py" \
            -not -path "*/venv/*" \
            -not -path "*/.venv/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/__pycache__/*" \
            -print0 | xargs -0 python -m py_compile

  js-checks:
    name: JavaScript Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: basics/11-voice-api-explorer/javascript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          node --check main.js
          node --check core.js
          node --check demos.js

  structure-check:
    name: Structure & Catalog Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate catalog and structure
        run: python .github/scripts/check_structure.py

  dependency-check:
    name: Dependency Resolution Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Validate all requirements.txt files
        run: |
          failed=0
          while IFS= read -r -d '' req; do
            # Skip venv and .venv directories
            case "$req" in
              *venv*) continue ;;
              *.venv*) continue ;;
            esac

            dir=$(dirname "$req")
            echo "::group::Checking $req"
            if uv pip compile "$req" --python-version 3.12 -q > /dev/null 2>&1; then
              echo "OK: $req"
            else
              echo "::error file=$req::Failed to resolve dependencies in $req"
              failed=1
            fi
            echo "::endgroup::"
          done < <(find . -name "requirements.txt" -not -path "*/venv/*" -not -path "*/.venv/*" -not -path "*/node_modules/*" -print0)

          if [ "$failed" -ne 0 ]; then
            echo "::error::One or more requirements.txt files failed dependency resolution"
            exit 1
          fi
          echo "All requirements.txt files resolved successfully"

  community-checks:
    name: Community Project Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint (community, warnings only)
        run: ruff check community/ || true
        continue-on-error: true

      - name: Validate community project structure
        run: python .github/scripts/check_community_structure.py

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    # Note: pipecat Dockerfile uses dailyco/pipecat-base which is ARM64-only,
    # so only amd64-compatible Dockerfiles are validated here.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build vapi-voice-assistant
        uses: docker/build-push-action@v6
        with:
          context: integrations/vapi/01-voice-assistant
          file: integrations/vapi/01-voice-assistant/Dockerfile
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=vapi-voice-assistant
          cache-to: type=gha,mode=max,scope=vapi-voice-assistant
