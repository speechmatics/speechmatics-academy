# Dependabot configuration for Speechmatics Academy
# Keeps dependencies secure and up-to-date across all examples
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # ── GitHub Actions ──────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns: ["*"]

  # ── npm (Voice API Explorer) ────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/basics/11-voice-api-explorer/javascript"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-deps:
        patterns: ["*"]

  # ── Docker ──────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/integrations/vapi/01-voice-assistant"
    schedule:
      interval: "weekly"
      day: "monday"

  - package-ecosystem: "docker"
    directory: "/integrations/pipecat/01-simple-voice-bot"
    schedule:
      interval: "weekly"
      day: "monday"

  # ── pip: Basics ─────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/basics/01-hello-world/python"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      basics-deps:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/basics/02-batch-vs-realtime/python"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      basics-deps:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/basics/03-configuration-guide/python"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      basics-deps:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/basics/04-audio-intelligence/python"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      basics-deps:
        patterns: ["*"]

  - package-ecosystem: "pip"
