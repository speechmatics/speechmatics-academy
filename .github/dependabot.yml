# Dependabot configuration for Speechmatics Academy
# Keeps dependencies secure and up-to-date across all examples.
#
# Uses the `directories` (plural) key with glob patterns so a single entry
# covers every example in a category — current and future — and `groups`
# consolidate all updates for that category into ONE pull request per cycle
# (instead of one PR per example directory).
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # ── GitHub Actions ──────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns: ["*"]

  # ── pip: Basics ─────────────────────────────────────────────────
  # Matches every requirements.txt under basics/** (venvs are gitignored).
  - package-ecosystem: "pip"
    directories:
      - "/basics/**"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      basics-deps:
        patterns: ["*"]

  # ── pip: Use Cases ──────────────────────────────────────────────
  - package-ecosystem: "pip"
    directories:
      - "/use-cases/**"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      use-case-deps:
        patterns: ["*"]

  # ── pip: Integrations ───────────────────────────────────────────
  - package-ecosystem: "pip"
    directories:
      - "/integrations/**"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      integration-deps:
        patterns: ["*"]

  # ── npm (Voice API Explorer) ────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/basics/11-voice-api-explorer/javascript"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-deps:
        patterns: ["*"]

  # ── Docker ──────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directories:
      - "/integrations/vapi/01-voice-assistant"
      - "/integrations/pipecat/01-simple-voice-bot"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      docker-deps:
        patterns: ["*"]
